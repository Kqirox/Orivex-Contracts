name: Rust CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

jobs:
  ci:
    name: Rust CI
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./contracts

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Pin to 1.84.0 — soroban-sdk 23's transitive deps (ethnum, ed25519-dalek)
      # are incompatible with newer Rust versions. Remove when upgrading soroban-sdk.
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@1.84.0
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown, wasm32v1-none

      - name: Cache cargo build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          workspaces: "./contracts"

      - name: Install Stellar CLI
        uses: stellar/stellar-cli@v23.0.1

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test

      - name: Build all Wasm artifacts
        run: stellar contract build

      - name: Check Wasm sizes
        run: |
          set -euo pipefail
          shopt -s nullglob
          # Per-contract size thresholds in bytes (default: 50000 = ~49KB).
          # Soroban protocol limit is 64KB; staying under 50KB leaves headroom.
          declare -A THRESHOLDS=(
            ["course_registry"]=50000
            ["quest_engine"]=50000
            ["reward_pool"]=50000
            ["badge_nft"]=50000
            ["governance"]=50000
            ["stake_vault"]=50000
          )
          FAILED=0
          for wasm in target/wasm32v1-none/release/*.wasm; do
            size=$(stat -c%s "$wasm")
            name=$(basename "$wasm" .wasm | tr '-' '_')
            threshold=${THRESHOLDS[$name]:-50000}
            if [ "$size" -ge "$threshold" ]; then
              echo "::error file=$wasm::WASM size ($size bytes) exceeds threshold ($threshold bytes)"
              FAILED=1
            else
              echo "OK: $wasm — $size / $threshold bytes"
            fi
          done
          exit $FAILED