name: Rust CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

jobs:
  ci:
    name: Rust CI
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./contracts

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown, wasm32v1-none

      - name: Cache cargo build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          workspaces: "./contracts"

      - name: Install Stellar CLI
        uses: stellar/stellar-cli@v23.0.1

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test

      - name: Build all Wasm artifacts
        run: stellar contract build

      - name: Check WASM size budgets
        id: wasm-check
        continue-on-error: true
        run: |
          chmod +x check-wasm-sizes.sh
          set +e
          ./check-wasm-sizes.sh | tee wasm-size-report.md
          WASM_EXIT=${PIPESTATUS[0]}
          set -e
          # Store report as step output for PR comment (always, even on failure)
          {
            echo 'report<<WASM_EOF'
            cat wasm-size-report.md
            echo 'WASM_EOF'
          } >> "$GITHUB_OUTPUT"
          exit $WASM_EXIT

      - name: Fail if WASM budgets exceeded
        if: steps.wasm-check.outcome == 'failure'
        run: |
          echo "One or more contracts exceed the WASM size budget!"
          exit 1

      - name: Post WASM size report to PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          header: wasm-size-report
          message: ${{ steps.wasm-check.outputs.report }}